<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - GreenHarvest</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .add-product-container { padding: 100px 5% 50px; max-width: 800px; margin: 0 auto; }
    .form-panel { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-color); outline: none; transition: border-color 0.3s; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-color); }
    
    .voice-add-box { background: rgba(76, 175, 80, 0.1); border: 2px dashed var(--primary-color); padding: 30px; text-align: center; border-radius: 15px; margin-bottom: 30px; }
    .mic-btn-large { background: var(--primary-color); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; margin-bottom: 15px; transition: transform 0.3s; }
    .mic-btn-large:hover { transform: scale(1.1); }
    .mic-active { background: #e53935; animation: mic-pulse 1s infinite; box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
    @keyframes mic-pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
      50% { transform: scale(1.08); box-shadow: 0 0 0 15px rgba(229,57,53,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229,57,53,0); }
    }

    .bilingual-preview {
      background: rgba(46,125,50,0.08);
      border: 1px solid rgba(46,125,50,0.2);
      border-radius: 10px;
      padding: 15px 20px;
      margin-top: 10px;
      display: none;
    }
    .bilingual-preview .lang-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .bilingual-preview .lang-row:last-child { margin-bottom: 0; }
    .bilingual-preview .lang-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lang-badge.tamil { background: #fff3e0; color: #e65100; }
    .lang-badge.english { background: #e3f2fd; color: #1565c0; }
    .bilingual-preview .lang-name {
      font-weight: 600;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass">
    <div class="nav-brand"><h2>🌾 GreenHarvest</h2></div>
    <ul class="nav-links">
      <li><a href="farmer-dashboard.html">Dashboard</a></li>
      <li><a href="add-product.html" style="color:var(--primary-color)">Add Product</a></li>
    </ul>
    <div class="nav-actions">
      <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider">🌙</span></label>
    </div>
  </nav>

  <div class="add-product-container animate-fade-in">
    <h1 style="margin-bottom: 30px; text-align: center; color: var(--primary-color)">Add New Product</h1>

    <div class="voice-add-box">
      <button class="mic-btn-large" id="voiceAddBtn" title="Use Voice Recognition">🎤</button>
      <h3 style="margin-bottom:10px">Voice Recognition</h3>
      <p style="color: var(--text-light); font-size: 0.9rem;">
        Click the microphone and say: <br>
        <i>"Add Vendaikai price 40 stock 50"</i><br>
        <small>or simply: <i>"Vendaikai 40 50"</i> — Tamil names auto-translate!</small>
      </p>
      <div id="voiceStatus" style="margin-top:15px; padding:10px; border-radius:8px; font-weight:500; display:none;"></div>
    </div>

    <div class="form-panel">
      <form id="productForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label>பொருள் பெயர் (Tamil Name)</label>
            <input type="text" id="prodNameTamil" required placeholder="e.g. Vendaikai, Thakkali">
          </div>
          <div class="form-group">
            <label>Product Name (English)</label>
            <input type="text" id="prodNameEnglish" placeholder="Auto-filled from Tamil name">
          </div>
        </div>

        <!-- Bilingual Preview -->
        <div class="bilingual-preview" id="bilingualPreview">
          <div class="lang-row">
            <span class="lang-badge tamil">தமிழ்</span>
            <span class="lang-name" id="previewTamil"></span>
          </div>
          <div class="lang-row">
            <span class="lang-badge english">ENG</span>
            <span class="lang-name" id="previewEnglish"></span>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
          <div class="form-group">
            <label>Category</label>
            <select id="prodCategory" required>
              <option value="vegetables">Vegetables</option>
              <option value="fruits">Fruits</option>
              <option value="leafygreens">Leafy Greens</option>
            </select>
          </div>
          <div class="form-group">
            <label>Farmer Name</label>
            <input type="text" id="prodFarmer" placeholder="e.g. Murugan, Lakshmi">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label>Price (₹ per kg)</label>
            <input type="number" id="prodPrice" required placeholder="40">
          </div>
          <div class="form-group">
            <label>Stock Quantity (kg)</label>
            <input type="number" id="prodStock" required placeholder="100">
          </div>
        </div>

        <div class="form-group">
          <label>Health Benefits & Description</label>
          <textarea id="prodDesc" rows="4" placeholder="Rich in Vitamin C, good for digestion..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">Submit Product</button>
      </form>
    </div>
  </div>

  <script src="js/darkmode.js"></script>
  <script src="js/script.js"></script>
  <script src="js/tamil-dictionary.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const voiceBtn = document.getElementById('voiceAddBtn');
      const prodNameTamil = document.getElementById('prodNameTamil');
      const prodNameEnglish = document.getElementById('prodNameEnglish');
      const prodPrice = document.getElementById('prodPrice');
      const prodStock = document.getElementById('prodStock');
      const voiceStatus = document.getElementById('voiceStatus');
      const bilingualPreview = document.getElementById('bilingualPreview');
      const previewTamil = document.getElementById('previewTamil');
      const previewEnglish = document.getElementById('previewEnglish');

      // ── Auto-translate on Tamil name input (only if English is empty) ──
      prodNameTamil.addEventListener('input', () => {
        const val = prodNameTamil.value.trim();
        if (val.length > 1) {
          const bilingual = getBilingualName(val);
          if (!prodNameEnglish.value.trim() || prodNameEnglish.dataset.autoFilled === "true") {
            prodNameEnglish.value = bilingual.english;
            prodNameEnglish.dataset.autoFilled = "true";
          }
          previewTamil.textContent = bilingual.tamil;
          previewEnglish.textContent = prodNameEnglish.value || bilingual.english;
          bilingualPreview.style.display = 'block';
        } else {
          bilingualPreview.style.display = 'none';
          if (prodNameEnglish.dataset.autoFilled === "true") {
            prodNameEnglish.value = '';
          }
        }
      });

      // Clear the autoFilled flag if user manually types in English field
      prodNameEnglish.addEventListener('input', () => {
        prodNameEnglish.dataset.autoFilled = "false";
        const val = prodNameEnglish.value.trim();
        
        // Also translate if Tamil name is empty
        if (val.length > 1 && !prodNameTamil.value.trim()) {
          const bilingual = getBilingualName(val);
          prodNameTamil.value = bilingual.tamil;
          previewTamil.textContent = bilingual.tamil;
          previewEnglish.textContent = bilingual.english;
          bilingualPreview.style.display = 'block';
        } else if (val.length > 1 || prodNameTamil.value.trim().length > 1) {
          previewEnglish.textContent = val;
        }
      });

      // ── Helper: show status messages ──
      function showStatus(msg, color) {
        voiceStatus.style.display = 'block';
        voiceStatus.style.background = color === 'green'
          ? 'rgba(76,175,80,0.15)' : color === 'red'
          ? 'rgba(244,67,54,0.12)' : 'rgba(33,150,243,0.12)';
        voiceStatus.style.color = color === 'green'
          ? '#2e7d32' : color === 'red'
          ? '#c62828' : '#1565c0';
        voiceStatus.textContent = msg;
      }

      // ── Detect Speech API ──
      const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechAPI) {
        voiceBtn.style.display = 'none';
        showStatus('⚠️ Your browser does not support Speech Recognition. Please use Chrome or Edge.', 'red');
      } else {
        const recognition = new SpeechAPI();
        recognition.lang = 'en-IN'; // Indian English handles Tanglish words much better
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        let isListening = false;

        voiceBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (isListening) {
            recognition.stop();
            return;
          }
          try {
            recognition.start();
            isListening = true;
            voiceBtn.classList.add('mic-active');
            showStatus('🎙️ Listening… speak now', 'blue');
          } catch (err) {
            showStatus('⚠️ Could not start microphone: ' + err.message, 'red');
          }
        });

        recognition.onresult = (event) => {
          let interimTranscript = '';
          let finalTranscript = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += t;
            } else {
              interimTranscript += t;
            }
          }

          if (interimTranscript) {
            showStatus('🎙️ Hearing: "' + interimTranscript + '"', 'blue');
          }

          if (finalTranscript) {
            const raw = finalTranscript;
            const text = raw.toLowerCase().trim();
            console.log('Voice final transcript:', raw);

            let name = '';
            let price = '';
            let stock = '';

            // Strategy 1: "add <name> price <num> stock <num>"
            let m;
            m = text.match(/(?:add\s+)?(.*?)\s*(?:price|rate|cost)\s*[:\-]?\s*(\d+)\s*(?:rupees?|rs\.?|₹)?\s*(?:stock|quantity|qty|kg)?\s*[:\-]?\s*(\d+)/i);
            if (m) { name = m[1]; price = m[2]; stock = m[3]; }

            if (!name) {
              m = text.match(/(?:add\s+)?(.*?)\s+(\d+)\s*(?:rupees?|rs\.?|₹)?\s*,?\s*(\d+)\s*(?:kg|stock|quantity)?/i);
              if (m) { name = m[1]; price = m[2]; stock = m[3]; }
            }

            if (!name) {
              m = text.match(/(?:add\s+)?(.*?)\s*(?:price|rate|cost)\s*[:\-]?\s*(\d+)/i);
              if (m) { name = m[1]; price = m[2]; }
            }

            if (!name) {
              m = text.match(/(?:add\s+)?([a-z ]+?)\s+(\d+)\s+(\d+)/i);
              if (m) { name = m[1]; price = m[2]; stock = m[3]; }
            }

            if (!name) {
              m = text.match(/(?:add\s+)?([a-z ]+?)\s+(\d+)/i);
              if (m) { name = m[1]; price = m[2]; }
            }

            if (!name) {
              m = text.match(/(?:add\s+)?([a-z ]+)/i);
              if (m) { name = m[1]; }
            }

            name = name.replace(/\b(price|rate|cost|stock|quantity|qty|rupees?|rs|kg|add)\b/gi, '').trim();

            let filled = [];
            if (name) {
              const bilingual = getBilingualName(name);
              prodNameTamil.value = bilingual.tamil;
              prodNameEnglish.value = bilingual.english;
              previewTamil.textContent = bilingual.tamil;
              previewEnglish.textContent = bilingual.english;
              bilingualPreview.style.display = 'block';
              filled.push('Tamil: ' + bilingual.tamil + ' / English: ' + bilingual.english);
            }
            if (price) {
              prodPrice.value = price;
              filled.push('Price: ₹' + price);
            }
            if (stock) {
              prodStock.value = stock;
              filled.push('Stock: ' + stock + ' kg');
            }

            if (filled.length > 0) {
              showStatus('✅ Filled — ' + filled.join(', '), 'green');
            } else {
              showStatus('⚠️ Could not parse: "' + raw + '". Try: "Vendaikai price 40 stock 50"', 'red');
            }
          }
        };

        recognition.onerror = (event) => {
          isListening = false;
          voiceBtn.classList.remove('mic-active');
          switch (event.error) {
            case 'not-allowed':
            case 'service-not-allowed':
              if (location.protocol === 'file:') {
                showStatus('🚫 Microphone blocked — file:// URLs cannot use the mic. Use VS Code Live Server extension.', 'red');
              } else {
                showStatus('🚫 Microphone permission denied. Allow mic access in your browser.', 'red');
              }
              break;
            case 'no-speech':
              showStatus('🔇 No speech detected. Click the mic and speak clearly.', 'red');
              break;
            case 'network':
              showStatus('🌐 Network error — check your internet connection.', 'red');
              break;
            default:
              showStatus('⚠️ Voice error: ' + event.error, 'red');
          }
        };

        recognition.onend = () => {
          isListening = false;
          voiceBtn.classList.remove('mic-active');
        };
      }

      // ── Form submit handler — saves to localStorage with bilingual names & images ──
      document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const inputTamil = prodNameTamil.value.trim();
        const bilingual = getBilingualName(inputTamil);
        // If the user typed phonetically ("perichaipalam"), upgrade it to real Tamil script if matched
        const finalTamil = (inputTamil.toLowerCase() === inputTamil && bilingual.tamil !== inputTamil) 
                           ? bilingual.tamil 
                           : inputTamil.charAt(0).toUpperCase() + inputTamil.slice(1);
        
        const finalEnglish = prodNameEnglish.value.trim() || bilingual.english;

        let products = JSON.parse(localStorage.getItem('farmer_products')) || [];

        // Duplicate check
        const isDuplicate = products.some(p => p.nameEnglish.toLowerCase() === finalEnglish.toLowerCase() || p.nameTamil === finalTamil);
        if (isDuplicate) {
          alert('⚠️ This product (' + finalEnglish + ' / ' + finalTamil + ') already exists in the inventory! View it in the dashboard.');
          window.location.href = 'farmer-dashboard.html';
          return; // Stop execution
        }

        let imageUrl = '';
        
        // Fetch image from Wikipedia (simulate online download)
        try {
          const wikiSearch = finalEnglish.split(' (')[0].trim(); // e.g. "Ladies Finger (Okra)" -> "Ladies Finger"
          const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiSearch)}&prop=pageimages&format=json&pithumbsize=400&origin=*`);
          const data = await res.json();
          const pages = data.query.pages;
          const pageId = Object.keys(pages)[0];
          
          if (pageId !== "-1" && pages[pageId].thumbnail) {
            const foundImage = pages[pageId].thumbnail.source;
            const useImage = confirm(`We found an online image for ${finalEnglish}. Do you want to download and use this image?\n\n(Click OK to use, Cancel to skip)`);
            if (useImage) {
              imageUrl = foundImage;
            }
          } else {
            // Fallback generic search if exact match fails
            const fallbackSearch = document.getElementById('prodCategory').value;
            const fbRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(fallbackSearch)}&prop=pageimages&format=json&pithumbsize=400&origin=*`);
            const fbData = await fbRes.json();
            const fbPages = fbData.query.pages;
            const fbPageId = Object.keys(fbPages)[0];
            if (fbPageId !== "-1" && fbPages[fbPageId].thumbnail) {
              const useFallback = confirm(`Could not find specific image for ${finalEnglish}. Use generic ${fallbackSearch} image instead?`);
              if (useFallback) imageUrl = fbPages[fbPageId].thumbnail.source;
            }
          }
        } catch (err) {
          console.error("Image fetch failed", err);
        }

        const newProd = {
          id: 'farmer_' + Date.now(),
          nameTamil: finalTamil,
          nameEnglish: finalEnglish,
          name: finalEnglish,  // backward compat
          category: document.getElementById('prodCategory').value,
          farmer: document.getElementById('prodFarmer').value || 'Local Farmer',
          price: document.getElementById('prodPrice').value,
          stock: document.getElementById('prodStock').value,
          description: document.getElementById('prodDesc').value,
          imageUrl: imageUrl, // Stored image
          addedAt: new Date().toISOString()
        };

       products.push(newProd);
localStorage.setItem('farmer_products', JSON.stringify(products));

window.location.replace('farmer-dashboard.html');
      });
    });
  </script>
  <script>
// ==========================
// LOAD USER PROFILE
// ==========================
function loadUser() {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) return;

  const nameEls = document.querySelectorAll("#farmerName");
  const emailEl = document.getElementById("farmerEmail");
  const phoneEl = document.getElementById("farmerPhone");

  nameEls.forEach(el => {
    el.textContent = "👨‍🌾 " + (user.name || "");
  });

  if (emailEl) emailEl.textContent = user.email || "";
  if (phoneEl) phoneEl.textContent = user.phone || "";
}

// ==========================
// RENDER INVENTORY
// ==========================
function renderInventory() {
  const tbody = document.getElementById("inventoryBody");

  if (!tbody) {
    console.error("inventoryBody not found");
    return;
  }

  const products =
    JSON.parse(localStorage.getItem("farmer_products")) || [];

  console.log("Loaded Products:", products);

  // Update Total Products card
  const statValues = document.querySelectorAll(".stat-value");
  if (statValues.length > 0) {
    statValues[0].textContent = products.length;
  }

  // Empty state
  if (products.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center;padding:30px;">
          No products added yet.
          <br><br>
          <a href="add-product.html"
             style="color:#4caf50;font-weight:bold;">
             ➕ Add Product
          </a>
        </td>
      </tr>
    `;
    return;
  }

  // Render products
  tbody.innerHTML = "";

  products.forEach((p, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>
        <strong style="color:#e65100">
          ${p.nameTamil || "-"}
        </strong>
      </td>

      <td>
        <strong>
          ${p.nameEnglish || p.name || "-"}
        </strong>
      </td>

      <td>
        ${p.category || "-"}
      </td>

      <td>
        👨‍🌾 ${p.farmer || "Local Farmer"}
      </td>

      <td>
        ₹${p.price || 0}/kg
      </td>

      <td>
        ${p.stock || 0} kg
      </td>

      <td>
        <button
          onclick="deleteProduct(${index})"
          style="
            background:#ef5350;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
          ">
          🗑 Delete
        </button>
      </td>
    `;

    tbody.appendChild(row);
  });
}

// ==========================
// DELETE PRODUCT
// ==========================
function deleteProduct(index) {
  const confirmDelete = confirm(
    "Are you sure you want to delete this product?"
  );

  if (!confirmDelete) return;

  let products =
    JSON.parse(localStorage.getItem("farmer_products")) || [];

  products.splice(index, 1);

  localStorage.setItem(
    "farmer_products",
    JSON.stringify(products)
  );

  renderInventory();
}

// ==========================
// LOGOUT
// ==========================
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

// ==========================
// PAGE LOAD
// ==========================
document.addEventListener("DOMContentLoaded", () => {
  loadUser();
  renderInventory();
});

// ==========================
// AUTO REFRESH
// ==========================
window.addEventListener("pageshow", () => {
  renderInventory();
});

window.addEventListener("storage", () => {
  renderInventory();
});
function getProductsByCategory(category) {
  const products = JSON.parse(localStorage.getItem("farmer_products")) || [];

  return products.filter(
    p => p.category &&
    p.category.toLowerCase() === category.toLowerCase()
  );
}
const newProd = {
  id: 'farmer_' + Date.now(),
  nameTamil: finalTamil,
  nameEnglish: finalEnglish,
  category: document.getElementById('prodCategory').value,
  farmer: document.getElementById('prodFarmer').value,
  price: document.getElementById('prodPrice').value,
  stock: document.getElementById('prodStock').value,
  description: document.getElementById('prodDesc').value,
  imageUrl: imageUrl
};
</script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
