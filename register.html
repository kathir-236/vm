<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - GreenHarvest</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/animations.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  
  <div class="auth-container" style="align-items: flex-start; padding: 40px 20px;">
    <div class="auth-box register-box glass animate-slide-up" style="margin: 0 auto;">
      <a href="index.html" style="font-size:24px; color:var(--primary-color); text-decoration:none; display:block; margin-bottom:10px; font-weight:bold;">🌾 GreenHarvest</a>
      <h2>Create Account</h2>
      
      <form id="registerForm">
        <div class="input-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        
        <div class="input-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" required placeholder="+1 234 567 8900">
        </div>
        
        <div style="display:flex; gap:15px;">
          <div class="input-group" style="flex:1;">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          <div class="input-group" style="flex:1;">
            <label for="confirmPassword">Confirm</label>
            <input type="password" id="confirmPassword" required placeholder="••••••••">
          </div>
        </div>
        
        <div class="input-group">
          <label for="userType">I want to register as a:</label>
          <select id="userType" required>
            <option value="customer">Customer</option>
            <option value="farmer">Farmer</option>
          </select>
        </div>
        
        <div class="input-group">
          <label for="address">Address</label>
          <textarea id="address" rows="3" required placeholder="Enter your full address"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary btn-auth">Register</button>
      </form>
      
      <div class="auth-switch">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/darkmode.js"></script>
  <script src="js/login.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
