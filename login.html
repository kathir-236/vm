<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GreenHarvest</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/animations.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  
  <div class="auth-container">
    <div class="auth-box glass animate-slide-up">
      <a href="index.html" style="font-size:24px; color:var(--primary-color); text-decoration:none; display:block; margin-bottom:10px; font-weight:bold;">🌾 GreenHarvest</a>
      <h2>Welcome Back</h2>
      
      <form id="loginForm">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="Enter your email">
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        
        <div class="auth-options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-auth">Login</button>
      </form>
      
      <div class="auth-switch">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/darkmode.js"></script>
  <script src="js/login.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
